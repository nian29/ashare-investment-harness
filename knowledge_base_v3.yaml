formulas:
  - raw: '期望值 = 胜率 × 赔率 − 败率 × 损失


      胜率：你判断正确的概率

      赔率：如果判断正确，你能赚多少

      败率：你判断错误的概率（= 1 − 胜率）

      损失：如果判断错误，你会亏多少'
    source: knowledge\01-决策系统\universal-decision-framework.md
