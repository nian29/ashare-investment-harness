    name: 短期阵痛
    content: 资本开支高峰期（2026年计划117亿），短期压制自由现金流
    source_file: knowledge\04-行业框架\industry-transportation-framework.md
  - id: rule_industry-transportation-framework_001
    name: 长期利好
    content: 每条路完工后重新核定25年，相当于"资产续命"
    source_file: knowledge\04-行业框架\industry-transportation-framework.md
  - id: rule_industry-transportation-framework_002
    name: 典型标的
    content: 上港集团（长三角）、宁波港、唐山港（股息率高）
    source_file: knowledge\04-行业框架\industry-transportation-framework.md
  - id: rule_sell-discipline-framework_tbl_000
    name: '**禀赋效应**'
    content: 拒绝止损，小亏变大亏
    source_file: knowledge\05-工具层\sell-discipline-framework.md
  - id: rule_valuation-methodology_000
    name: PS（市销率）
    content: 当利润为负或不稳定时，看收入质量
    source_file: knowledge\05-工具层\valuation-methodology.md
  - id: rule_valuation-methodology_001
    name: PEG（看前瞻增速而非历史）
    content: 如果明年增速 100%，PE 100 倍 = PEG 1.0
    source_file: knowledge\05-工具层\valuation-methodology.md
  - id: rule_valuation-methodology_002
    name: 终局思维
    content: 算一下 5 年后这个市场多大、这家公司能拿多少份额、能赚多少利润 → 倒推今天值多少
    source_file: knowledge\05-工具层\valuation-methodology.md
  - id: rule_investment-daily-check_tbl_000
    name: 标的
    content: 清仓(-15%)
