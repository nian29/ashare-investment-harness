    content: 单一行业不超过 **40%**
    source_file: knowledge\00-哲学层\investment-handbook.md
  - id: rule_investment-handbook_tbl_003
    name: 首次建仓
    content: 不超过该标的总计划仓位的 **50%**
    source_file: knowledge\00-哲学层\investment-handbook.md
  - id: rule_investment-handbook_tbl_004
    name: 🔴 硬止损
    content: 减仓一半
    source_file: knowledge\00-哲学层\investment-handbook.md
