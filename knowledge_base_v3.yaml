    content: 重新评估逻辑，可能减仓
    source_file: knowledge\00-哲学层\investment-handbook.md
  - id: rule_investment-handbook_tbl_008
    name: 禁止行为
    content: 原因
    source_file: knowledge\00-哲学层\investment-handbook.md
  - id: rule_investment-handbook_tbl_009
    name: 不做笔记就交易
    content: 没有记录就没有进步
    source_file: knowledge\00-哲学层\investment-handbook.md
  - id: rule_financial-crisis-classics_tbl_000
    name: 如果狂热突然结束，我的持仓能不能扛住-20%到-30%的回撤？
    content: 银行(农行)+消费(海天)+电力ETF + 31%现金 → 防御性尚可但需持续评估
    source_file: knowledge\02-宏观层\financial-crisis-classics.md
  - id: rule_sell-discipline-framework_001
    name: 绝不因"涨太多了"而匆忙卖。 涨多了不是卖的理由，涨到超过合理估值上限才是。让利润奔跑，但用移动止盈绳拴着。
    content: 绝不因"涨太多了"而匆忙卖。 涨多了不是卖的理由，涨到超过合理估值上限才是。让利润奔跑，但用移动止盈绳拴着。
    source_file: knowledge\05-工具层\sell-discipline-framework.md
  - id: rule_sell-discipline-framework_002
    name: 绝不因"跌太多了"而恐慌卖。 跌到了止损线才卖，不是"跌到你觉得难受"就卖。
    content: 绝不因"跌太多了"而恐慌卖。 跌到了止损线才卖，不是"跌到你觉得难受"就卖。
    source_file: knowledge\05-工具层\sell-discipline-framework.md
  - id: rule_sell-discipline-framework_003
    name: 绝不因"别人都在卖"而卖。 这是从众，不是决策。
    content: 绝不因"别人都在卖"而卖。 这是从众，不是决策。
