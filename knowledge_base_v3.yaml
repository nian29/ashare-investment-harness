  - file: knowledge\04-行业框架\industry-banking-framework.md
    name: 银行业分析框架
    filename: industry-banking-framework
    key_metrics:
      - name: 二、核心指标四件套（每次必看）
        value: ''
        source: 指标标题
      - name: 净息差（NIM）
        value: 净息差 = 生息资产收益率 − 计息负债成本率
        source: 指标标题
      - name: 不良贷款率 + 关注类贷款迁徙率
        value: 不良率是静态的，**关注类贷款迁徙率是动态的**——它告诉你"下一批不良从哪来"。
        source: 指标标题
      - name: 拨备覆盖率
        value: 拨备覆盖率 = 贷款损失准备 / 不良贷款余额
        source: 指标标题
      - name: 资本充足率
        value: 资本充足率 = 资本净额 / 风险加权资产
        source: 指标标题
      - name: 三、银行的 ROE 拆解——理解"为什么 ROE 只有 10%"
        value: ROE = 净利润 / 净资产 = 10.16%（农行 2025）
        source: 指标标题
      - name: 路径 A：吃股息（你现在的策略）
        value: 适合标的：农行、建行、中行等国有大行
        source: 指标标题
      - name: 路径 C：赌增长
        value: 适合标的：招商银行、宁波银行等零售/财富管理强的银行
        source: 指标标题
    valuation_logic: "综合评估\n\n用晨星护城河框架对照：\n\n```\n□ 护城河定性：牌照（有效规模）+ 转换成本\n   → 银行牌照是稀缺资源，新进入者几乎不可能\n   → 企业换银行 = 所有贷款/结算/代发工资要重签，转换成本极高\n\
      \n□ 护城河宽度：宽阔\n   → 四大行基本不可替代，央行最后贷款人身份决定大而不倒\n\n□ 护城河趋势：稳定偏正面\n   → 县域存款成本优势（1.28%）是全行最低的——别人拿不到这么便宜的钱\n   → 但息差下行压力仍在，需要关注\n\
      \n□ 假护城河排查：\n   ⚠️ ROE 10% 不是高——靠杠杆撑起来的，不要被 40% 净利率迷惑\n\n□ 进化分类：传统护城河（壁垒强但增长有限，回报靠分红）\n```\n\n**投资逻辑一句话**：农行不是买增长的，是买分红\
      \ + 买资产质量改善 + 买 PB 修复的。"
    cycle_position: ''
  - file: knowledge\04-行业框架\industry-consumer-framework.md
    name: 消费/食品行业分析框架
    filename: industry-consumer-framework
    key_metrics:
      - name: '**量**'
        value: 渗透率提升——更多人买，或者每个人买更多 | 最好的增长（可持续）
        source: 表格行
      - name: '**价**'
        value: 提价能力——涨价后销量不跌 | 次好的增长（但天花板有限）
        source: 表格行
      - name: '**品类扩张**'
        value: 酱油 → 蚝油 → 调味酱 → 复合调味料 | 最关键的长期增长来源
        source: 表格行
    valuation_logic: "综合评估\n\n用晨星护城河框架：\n\n```\n□ 护城河定性：品牌（无形资产）+ 成本优势（规模经济）\n   → 品牌：海天酱油 = 酱油的代名词，提价不丢客户\n   → 成本优势：产能 400\
      \ 万吨+（对手最大的不到 100 万吨），规模优势不可复制\n   → 渠道锁定：300 万个终端网点，新品牌根本铺不进去\n\n□ 护城河宽度：宽阔\n   → 酱油行业的格局（海天 > 25%，第二名 < 10%）几乎不可撼动\n\
      \   → 规模优势 + 品牌认知 + 渠道密度 = 三重壁垒\n\n□ 护城河趋势：稳定偏正面\n   → 品类扩张在加速（其他 +14.55%）\n   → 灯塔工厂降本增效（结构性的）\n   → 渠道丝毫无损（6,700 家经销商稳定）\n\
      \n□ 假护城河排查：\n   ✅ 品牌是真的（提价历史证明）\n   ✅ 高份额是真的（不是降价换来的）\n   ⚠️ ROE 下降是 H 股上市所致，不是经营恶化\n\n□ 进化分类：再投资护城河（壁垒强 + 品类扩张让利润能以高\
      \ ROIC 再投入）\n```\n\n**投资逻辑一句话**：海天是 A 股最接近\"永续消费品\"的公司之一。买的是 10 年以上的品牌复"
    cycle_position: ''
