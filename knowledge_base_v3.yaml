  - id: rule_investment-daily-log_001
    name: 宏观传导（最重要）
    content: 沃什鹰派 → 加息预期升温 → NIM 扩张预期 → 银行利润改善。框架第 2 章讲的两条传导路径，今天"NIM 利好"路径压倒了一切。
    source_file: knowledge\08-日志\investment-daily-log.md
  - id: rule_investment-daily-log_002
    name: 资金高低切
    content: 科技连续暴涨 5 天后，部分资金端午节前获利了结，回流低估值的银行。农行 PB 0.81、股息 ~3.7%，在加息预期下是"最像债券的股票"。
