rules:
  - id: rule_howard-marks-investment-principles_tbl_000
    name: 安全边际
    content: 所有标的 -8%/-15% 两级止损线（按6/12收盘价更新）
    source_file: knowledge\00-哲学层\howard-marks-investment-principles.md
  - id: rule_howard-marks-investment-principles_001
    name: '"普遍认为没有风险，就是最大的风险"（反过来也成立）'
    content: 6/11市场被战争恐慌笼罩时，反而是近期最好的买点。6/12-13恐慌消退，市场大涨。
    source_file: knowledge\00-哲学层\howard-marks-investment-principles.md
  - id: rule_howard-marks-investment-principles_002
    name: '"钟摆永远在极端之间摆动"'
    content: 地缘风险的钟摆正在从"战争恐慌"极端向"和平乐观"摆动。但马克斯提醒我们——**钟摆很少停在中间，也不会在中间停很久**。下一个极端可能是"过度乐观"。
    source_file: knowledge\00-哲学层\howard-marks-investment-principles.md
