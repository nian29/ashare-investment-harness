  - id: rule_sell-discipline-framework_005
    name: 绝不因为"找到了更好的机会"而匆忙卖。 先研究新机会，确认它确实更好，再执行调仓。
    content: 绝不因为"找到了更好的机会"而匆忙卖。 先研究新机会，确认它确实更好，再执行调仓。
