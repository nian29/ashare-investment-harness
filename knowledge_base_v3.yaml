  - id: rule_investment-daily-check_001
    name: 催化剂
    content: 息差企稳 + 分红提升 + 经济复苏降低坏账
    source_file: knowledge\06-执行层\investment-daily-check.md
  - id: rule_investment-daily-check_002
    name: 催化剂
    content: 餐饮复苏 + 原料成本低位 + 品类扩展加速
    source_file: knowledge\06-执行层\investment-daily-check.md
  - id: rule_investment-daily-check_003
    name: 路线 A
    content: 海天回到 **34.00 元**（除息后成本）→ 卖出 50 股，保留 150 股（~21%）
    source_file: knowledge\06-执行层\investment-daily-check.md
  - id: rule_investment-daily-check_004
    name: 路线 B
    content: 海天跌到 **31.28 元**（-8% 止损）→ 卖出 100 股，保留 100 股（止损纪律优先）
    source_file: knowledge\06-执行层\investment-daily-check.md
  - id: rule_investment-daily-check_005
    name: 路线 C
    content: '**2026-07-15** 前未触发 A 或 B → 以市价卖出 50 股（时间止损）'
    source_file: knowledge\06-执行层\investment-daily-check.md
  - id: rule_investment-daily-check_006
    name: 催化剂
    content: 夏季用电高峰 + 节能降碳政策 + 核电机制电价
    source_file: knowledge\06-执行层\investment-daily-check.md
  - id: rule_investment-daily-check_007
    name: 催化剂
    content: 改扩建续命（锡宜模式）+ 收费管理条例修订 + 车流量自然增长
    source_file: knowledge\06-执行层\investment-daily-check.md
  - id: rule_investment-daily-check_tbl_008
    name: 硬止损
    content: 单只 -8% 减半，-15% 全清
    source_file: knowledge\06-执行层\investment-daily-check.md
  - id: rule_investment-daily-check_tbl_009
    name: 移动止盈
    content: 从最高点回撤 -8% 触发
    source_file: knowledge\06-执行层\investment-daily-check.md
  - id: rule_investment-daily-check_tbl_010
    name: 买入纪律
    content: 分2-3次、不开盘30分钟内、不追涨停
    source_file: knowledge\06-执行层\investment-daily-check.md
  - id: rule_pre-trade-checklist_tbl_000
    name: 仓位太重："全买进去"
    content: 单只不超过20%，永远留现金
    source_file: knowledge\06-执行层\pre-trade-checklist.md
  - id: rule_pre-trade-checklist_001
    name: 截图存手机
    content: 把正面"买入七问"截图存相册，下单前翻出来看
    source_file: knowledge\06-执行层\pre-trade-checklist.md
  - id: rule_pre-trade-checklist_002
    name: 设交易密码
    content: 把你的交易密码改成"止损了吗"的首字母（ZSLM+数字）
    source_file: knowledge\06-执行层\pre-trade-checklist.md
  - id: rule_pre-trade-checklist_003
    name: 延迟规则
    content: 晚上想买 → 睡一觉，第二天早上再决定（90%的冲动会消失）
    source_file: knowledge\06-执行层\pre-trade-checklist.md
  - id: rule_pre-trade-checklist_004
    name: 决策日志
    content: 每次下单后在日记里写一句话，半年后回头看
    source_file: knowledge\06-执行层\pre-trade-checklist.md
  - id: rule_stock-picking-process_000
    name: 看历史
    content: 这个价格在它过去5年里算贵还是便宜？
    source_file: knowledge\06-执行层\stock-picking-process.md
  - id: rule_stock-picking-process_001
    name: 反向推
    content: 当前价格"赌"的利润增速是多少？这个增速实际能做到吗？
    source_file: knowledge\06-执行层\stock-picking-process.md
  - id: rule_stock-picking-process_002
    name: 跟同行比
    content: 同一行业里，它的价格是贵还是便宜？
    source_file: knowledge\06-执行层\stock-picking-process.md
  - id: rule_investment-beginner-mode_000
    name: 数字要说人话
    content: '"浮亏-144元"不够——要加"就是你900股农行从买入到现在账面亏了144块，还没卖所以不是实际亏损"。'
