  - id: rule_financial-crisis-classics_001
    name: 远因比近因重要
    content: 近因（某银行倒闭/欺诈曝光）只是导火索，真正的杀手是远因——**投机和信用扩张**
    source_file: knowledge\02-宏观层\financial-crisis-classics.md
  - id: rule_financial-crisis-classics_002
    name: 信用具有内生不稳定性
    content: 繁荣期金融系统会自发创造新信用工具来火上浇油——"这次我们有CDO/AI/算法"——本质永远一样
    source_file: knowledge\02-宏观层\financial-crisis-classics.md
  - id: rule_financial-crisis-classics_003
    name: 最后贷款人悖论
    content: '"最后贷款人应当存在，但其存在应当让人存疑"——太确定的安全网产生道德风险，完全没有则危机会演变成大萧条'
    source_file: knowledge\02-宏观层\financial-crisis-classics.md
  - id: rule_financial-crisis-classics_tbl_003
    name: 政策药方
    content: 财政纪律 + 警惕债务积累
    source_file: knowledge\02-宏观层\financial-crisis-classics.md
  - id: rule_financial-crisis-classics_tbl_004
    name: 如果狂热突然结束，我的持仓能不能扛住-20%到-30%的回撤？
    content: 银行(农行)+消费(海天)+电力ETF + 31%现金 → 防御性尚可但需持续评估
    source_file: knowledge\02-宏观层\financial-crisis-classics.md
  - id: rule_macro-voices-spectrum_tbl_000
    name: 配置建议
    content: 黄金5-15%、全球多元化、构建全天候组合
    source_file: knowledge\02-宏观层\macro-voices-spectrum.md
  - id: rule_macro-voices-spectrum_tbl_001
    name: 海天止损
    content: '**到就执行**'
    source_file: knowledge\02-宏观层\macro-voices-spectrum.md
